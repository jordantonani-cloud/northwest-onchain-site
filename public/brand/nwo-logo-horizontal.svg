<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 72" role="img" aria-label="Northwest Onchain">
  <title>Northwest Onchain — horizontal lockup (light backgrounds)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
    .wm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:27px;letter-spacing:-0.5px}
    .tag{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:8px;letter-spacing:3px}
  </style>
  <g transform="translate(6,5)">
    <circle cx="32" cy="18" r="12.5" fill="none" stroke="#2FBF98" stroke-width="1" opacity="0.28"/>
    <circle cx="32" cy="18" r="8" fill="none" stroke="#2FBF98" stroke-width="1.3" opacity="0.55"/>
    <path d="M16 46 L32 18 L48 46" fill="none" stroke="#12463A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="16" cy="46" r="3.2" fill="#12463A"/>
    <circle cx="48" cy="46" r="3.2" fill="#12463A"/>
    <circle cx="32" cy="18" r="4.5" fill="#2FBF98"/>
  </g>
  <text class="wm" x="88" y="37" fill="#10221C">Northwest <tspan fill="#12463A">Onchain</tspan></text>
  <text class="tag" x="89" y="54" fill="#2A8E72">ONCHAIN, ON PURPOSE</text>
